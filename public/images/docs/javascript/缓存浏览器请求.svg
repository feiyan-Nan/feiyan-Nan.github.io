ill="#1e293b" font-family="system-ui, sans-serif">渲染页面</text><text x="40" y="210" font-size="11" fill="#64748b" font-family="system-ui">1. 浏览器发起请求</text><text x="40" y="226" font-size="11" fill="#64748b" font-family="system-ui">2. 缓存中无记录</text><text x="40" y="242" font-size="11" fill="#64748b" font-family="system-ui">3. 向服务器请求资源</text><text x="40" y="258" font-size="11" fill="#64748b" font-family="system-ui">4. 服务器返回资源 + 缓存策略</text><text x="40" y="274" font-size="11" fill="#64748b" font-family="system-ui">5. 缓存存储资源</text><text x="40" y="290" font-size="11" fill="#64748b" font-family="system-ui">6. 浏览器渲染</text>
